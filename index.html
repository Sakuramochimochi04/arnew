<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>魔法のドレス AR (MindAR版)</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<style>
  body { margin:0; padding:0; overflow:hidden; }

  #ui {
    position:fixed; left:0; right:0; bottom:0; z-index:30;
    display:flex; flex-direction:column; align-items:center; padding-bottom:30px;
    pointer-events:none;
  }
  #msg {
    margin-bottom:12px; padding:8px 16px; border-radius:16px;
    background:rgba(0,0,0,0.6); color:#fff; font-size:13px;
    max-width:82%; text-align:center; line-height:1.5;
    font-family:sans-serif;
  }
  #spellBtn {
    pointer-events:auto;
    padding:14px 30px; font-size:16px; border-radius:30px; border:none;
    background:linear-gradient(135deg,#f6d365,#fda085); color:#3a2a00; font-weight:bold;
    box-shadow:0 4px 14px rgba(0,0,0,0.35); display:none;
  }
</style>
</head>
<body>

<div id="ui">
  <div id="msg">カードの画像にカメラを向けてください</div>
  <button id="spellBtn" onclick="castSpell()">✨ 魔法をかける ✨</button>
</div>

<script>
/* ── オリジナルキャラクター(著作権のあるデザインは使用していない) ── */
AFRAME.registerComponent('magic-dress', {
  init: function () {
    const el = this.el;
    const THREE = AFRAME.THREE;
    const group = new THREE.Group();
    this.group = group;

    const skinMat = new THREE.MeshStandardMaterial({color:0xffddc2, roughness:0.6});
    const hairMat = new THREE.MeshStandardMaterial({color:0x6b4a2b, roughness:0.7});
    const dressMat = new THREE.MeshStandardMaterial({color:0x8a8378, roughness:0.9, emissive:new THREE.Color(0x000000)});
    this.dressMat = dressMat;

    // 頭
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.12,24,24), skinMat);
    head.position.y = 0.62;
    group.add(head);

    // 髪
    const hair = new THREE.Mesh(new THREE.SphereGeometry(0.135,24,24), hairMat);
    hair.scale.set(1,0.9,1);
    hair.position.y = 0.66;
    group.add(hair);

    // 上半身
    const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.16,0.3,20), dressMat);
    torso.position.y = 0.38;
    group.add(torso);

    // スカート
    const skirt = new THREE.Mesh(new THREE.ConeGeometry(0.25,0.42,24,1,true), dressMat);
    skirt.position.y = 0.06;
    group.add(skirt);
    this.skirt = skirt;

    // 腕
    const armGeo = new THREE.CylinderGeometry(0.03,0.03,0.28,10);
    const armL = new THREE.Mesh(armGeo, skinMat);
    armL.position.set(-0.16,0.42,0); armL.rotation.z = Math.PI/10;
    group.add(armL);
    const armR = armL.clone();
    armR.position.x = 0.16; armR.rotation.z = -Math.PI/10;
    group.add(armR);

    el.setObject3D('magicDress', group);

    this.transformed = false;
    this.particles = null;
    this.particleData = [];
    this.animating = false;
    this.animStart = 0;
  },

  castSpell: function () {
    if (this.transformed) return;
    this.transformed = true;
    this.animStart = Date.now();
    this.animating = true;
    this.startColor = new AFRAME.THREE.Color(0x8a8378);
    this.targetColor = new AFRAME.THREE.Color(0x8fd1ff);
    this.startScale = this.skirt.scale.clone();
    this.targetScale = new AFRAME.THREE.Vector3(1.7,1.25,1.7);
    this.spawnSparkles();
  },

  spawnSparkles: function () {
    const THREE = AFRAME.THREE;
    const count = 100;
    const positions = new Float32Array(count*3);
    this.particleData = [];
    for (let i=0;i<count;i++){
      const angle = Math.random()*Math.PI*2;
      const radius = 0.15+Math.random()*0.3;
      const y = Math.random()*0.65;
      positions[i*3]   = Math.cos(angle)*radius;
      positions[i*3+1] = y;
      positions[i*3+2] = Math.sin(angle)*radius;
      this.particleData.push({angle, radius, y, speed:0.6+Math.random()*1.4});
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
    const mat = new THREE.PointsMaterial({color:0xfff2b3, size:0.04, transparent:true, opacity:0.9});
    if (this.particles) this.group.remove(this.particles);
    this.particles = new THREE.Points(geo, mat);
    this.group.add(this.particles);
  },

  tick: function () {
    // パーティクルアニメーション
    if (this.particles) {
      const d = 0.016;
      const pos = this.particles.geometry.attributes.position;
      for (let i=0;i<this.particleData.length;i++){
        const p = this.particleData[i];
        p.angle += d*p.speed;
        pos.setXYZ(i, Math.cos(p.angle)*p.radius, p.y, Math.sin(p.angle)*p.radius);
      }
      pos.needsUpdate = true;
      this.particles.rotation.y += d*0.4;
    }

    // ドレス変身アニメーション
    if (this.animating) {
      const elapsed = (Date.now() - this.animStart) / 1000;
      const t = Math.min(elapsed / 2.2, 1);
      const eased = t*t*(3-2*t);

      this.dressMat.color.copy(this.startColor).lerp(this.targetColor, eased);
      this.dressMat.emissive.setRGB(eased*0.15, eased*0.15, eased*0.05);
      this.skirt.scale.lerpVectors(this.startScale, this.targetScale, eased);
      this.group.rotation.y = eased * Math.PI * 2;

      if (t >= 1) {
        this.animating = false;
        document.getElementById('msg').textContent = '✨ ドレスが変わりました！';
      }
    }
  }
});

/* ── ボタン制御 ── */
function castSpell() {
  const el = document.querySelector('[magic-dress]');
  if (el && el.components['magic-dress']) {
    el.components['magic-dress'].castSpell();
    document.getElementById('msg').textContent = '✨ 魔法をかけています… ✨';
    document.getElementById('spellBtn').style.display = 'none';
  }
}

/* ── マーカー検出時にボタン表示 ── */
document.addEventListener('DOMContentLoaded', () => {
  const scene = document.querySelector('a-scene');
  scene.addEventListener('loaded', () => {
    const target = document.querySelector('[mindar-image-target]');
    if (target) {
      target.addEventListener('targetFound', () => {
        document.getElementById('msg').textContent = '画像を検出しました！ ボタンを押してください';
        document.getElementById('spellBtn').style.display = 'block';
      });
      target.addEventListener('targetLost', () => {
        document.getElementById('msg').textContent = 'カードの画像にカメラを向けてください';
      });
    }
  });
});
</script>

<a-scene
  mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind;"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">
    <a-entity magic-dress position="0 0.3 0"></a-entity>
  </a-entity>
</a-scene>

</body>
</html>
